<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
	<title>Simple MIDI Calibration</title>
	<meta name="description" content="Web interface for the Simple MIDI card of the Music Thing Workshop System Computer">

	<style>
	  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

	  body {
		  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
		  background: #fff;
		  color: #111;
		  min-height: 100vh;
	  }
	  .instrimg {
		  display: block;
		  max-width: 411px;
		  max-height: 302px;
		  width: auto;
		  height: auto;
		  margin: 0px auto;
	  }
	  #pageHeader {
		  padding: 32px 64px 32px;
		  border-bottom: 3px solid #111;
		  text-align: center;
	  }
	  #pageHeader h1 {
		  font-size: 2rem;
		  font-weight: 800;
		  letter-spacing: -0.5px;
		  line-height: 1;
	  }
	  #pageHeader p {
		  margin-top: 6px;
		  font-size: 0.85rem;
		  color: #888;
		  letter-spacing: 0.5px;
		  text-transform: uppercase;
	  }

	  #statusDiv {
		  position: fixed;
		  top: 20px;
		  right: 28px;
		  font-size: 0.75rem;
		  font-weight: 700;
		  letter-spacing: 1px;
		  text-transform: uppercase;
		  color: #aaa;
	  }

	  #content {
		  max-width: 700px;
		  margin: 0 auto;
		  padding: 48px 0 80px;
		  display: flex;
		  flex-direction: column;
		  gap: 40px;
	  }

	  /* ── Main menu ── */
	  #menu {
		  display: flex;
		  flex-direction: column;
		  gap: 16px;
	  }
	  .menu-option {
		  border: 2px solid #111;
		  padding: 28px 32px;
		  cursor: pointer;
		  transition: background 0.1s;
		  user-select: none;
	  }
	  .menu-option:hover { background: #f5f5f5; }
	  .menu-option:active { background: #eee; }
	  .menu-option-title {
		  font-size: 1.1rem;
		  font-weight: 800;
		  letter-spacing: -0.3px;
		  display: flex;
		  align-items: center;
		  gap: 12px;
	  }
	  .menu-option-tag {
		  font-size: 0.6rem;
		  font-weight: 800;
		  letter-spacing: 1.5px;
		  text-transform: uppercase;
		  color: #fff;
		  background: #111;
		  padding: 3px 8px;
	  }
	  .menu-option-desc {
		  margin-top: 8px;
		  font-size: 0.85rem;
		  color: #888;
		  line-height: 1.55;
	  }

	  /* ── Back button ── */
	  .back-btn {
		  background: transparent !important;
		  color: #999 !important;
		  border: 1.5px solid #ddd;
		  font-size: 0.72rem !important;
		  font-weight: 700 !important;
		  letter-spacing: 1px !important;
		  padding: 7px 14px !important;
		  align-self: flex-start;
		  cursor: pointer;
	  }
	  .back-btn:hover { color: #111 !important; border-color: #999; background: #f5f5f5 !important; }
	  .back-btn:active { background: #eee !important; }

	  /* ── Calibration sections (shared) ── */
	  #calSection-combined, #calSection-inputs {
		  display: none;
		  flex-direction: column;
		  gap: 24px;
	  }
	  #calSection-combined, #calSection-inputs {
		  align-items: center;
		  text-align: center;
	  }

	  .calPanel {
		  border: 2px solid #111;
		  padding: 28px 32px;
		  display: flex;
		  flex-direction: column;
		  gap: 20px;
	  }
	  .cal-header {
		  display: flex;
		  align-items: center;
		  justify-content: space-between;
		  gap: 16px;
	  }
	  .calSteps {
		  font-size: 0.75rem;
		  font-weight: 700;
		  letter-spacing: 1.5px;
		  text-transform: uppercase;
		  color: #aaa;
	  }
	  .calInstruction {
		  font-size: 1.05rem;
		  line-height: 1.6;
		  min-height: 2.4em;
		  color: #333;
	  }
	  .calProgress {
		  font-size: 0.8rem;
		  color: #888;
		  font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
		  letter-spacing: 0.5px;
	  }
	  #calProgress-combined, #calProgress-inputs { width: 100%; }

	  .eepromPanel, .calNextPanel {
		  display: none;
		  align-items: center;
		  gap: 16px;
	  }
	  .eepromStatus {
		  font-size: 0.85rem;
		  color: #666;
	  }

	  /* ── Buttons ── */
	  button {
		  appearance: none;
		  background: #111;
		  color: #fff;
		  border: none;
		  font-family: inherit;
		  font-size: 0.8rem;
		  font-weight: 800;
		  letter-spacing: 1.5px;
		  text-transform: uppercase;
		  padding: 12px 24px;
		  cursor: pointer;
		  transition: background 0.1s;
	  }
	  button:hover  { background: #444; }
	  button:active { background: #000; }
	  button:disabled { background: #ccc; color: #999; cursor: default; }

	  canvas { display: block; }

	  /* ── Oscillator readouts (used during combined cal) ── */
	  #noteDisplay  { color: #4b0082; }
	  #noteDisplay2 { color: #c04000; }
	  </style>

	<script src="interface.js"></script>
  </head>

  <body>

	<div id="statusDiv">
	  <div id="connectedStatus">Loading…</div>
	</div>

	<header id="pageHeader">
	  <h1>Workshop Computer Calibration</h1>
	</header>

	<div id="content">

	  <!-- Main menu -->
	  <div id="menu">
		<div class="menu-option" onclick="startStandalone()">
		  <div class="menu-option-title">Standalone Workshop System Calibration</div>
		  <div class="menu-option-desc">...if you have a Workshop System and no other 1V/octave gear to calibrate it against.</div>
		</div>
		<div class="menu-option" onclick="showSection('inputs')">
		  <div class="menu-option-title">Computer input calibration</div>
		  <div class="menu-option-desc">... if you've calibrated the Computer outputs already.</div>
		</div>
	  </div>

	  <!-- CV output calibration -->
	  <div id="calSection-combined">
		<button class="back-btn" onclick="showMenu()">&#8592; Cancel</button>
		<span id="calSteps-combined" class="calSteps"></span>
		<div id="calInstruction-combined" class="calInstruction"></div>
		<div id="calProgress-combined" class="calProgress"></div>
		<button id="startBtn-combined" onclick="startCalibration('combined')">Start Calibration</button>
		<div id="continuePanel-combined" style="display:none;align-items:center;gap:16px">
		  <button onclick="continueToCalibration()">Continue</button>
		</div>
		<canvas id="graphAtRes-combined" width="500" height="250" style="display:none"></canvas>
		<div id="eepromPanel-combined" class="eepromPanel">
		  <button onclick="saveCalToEEPROM()">Save to Workshop Computer</button>
		  <div id="eepromStatus-combined" class="eepromStatus"></div>
		</div>
		<div id="standalonePanel-combined" class="eepromPanel">
		  <button onclick="continueStandaloneToInputs()">Save &amp; Continue to Input Calibration &#8594;</button>
		</div>
	  </div>

	  <!-- CV / audio input calibration -->
	  <div id="calSection-inputs">
		<button id="backBtn-inputs" class="back-btn" onclick="showMenu()">&#8592; Cancel</button>
		<span id="calSteps-inputs" class="calSteps"></span>
		<div id="calInstruction-inputs" class="calInstruction"></div>
		<div id="calProgress-inputs" class="calProgress"></div>
		<button id="startBtn-inputs" onclick="startCalibration('inputs')">Start Calibration</button>
	  </div>

	</div>

  </body>
</html>
